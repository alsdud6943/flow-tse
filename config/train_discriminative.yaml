# Example Configuration for train.py

seed: 42
logstdout: False


# Model parameters for SingleStepRegenerationModel
model:
  _target_: sgmse.model.DisrcriminativeRegenerationModel
  lr: 0.0001   
  ema_decay: 0.999
  # t_eps: 0.03 
  loss_type_score: "mse"
  num_eval_files: 100

  backbone_score:
    _target_: sgmse.backbones.ncsnpp_usef_2input.NCSNpp2
    scale_by_sigma: False # Do not scale by sigma for single-step model
    nonlinearity: "swish" 
    nf: 128
    ch_mult: [1, 1, 2, 2, 2, 2, 2]
    num_res_blocks: 2
    attn_resolutions: [16,]
    centered: True
    image_size: 256 # should be 128 for n_fft=254, 256 for n_fft=510
    approx_qk_dim: 2048

    conditional: False


  data_module:
    _target_: datasets.librimix.SpecsDataModuleTSE
    
    val_mix_scp: /home/minyeong/dataset/flowtse_list/libri2mix_dev/mix_clean.scp
    val_regi_scp: /home/minyeong/dataset/flowtse_list/libri2mix_dev/aux_s1.scp
    val_clean_scp: /home/minyeong/dataset/flowtse_list/libri2mix_dev/s1.scp
    test_mix_scp: /home/minyeong/dataset/flowtse_list/libri2mix_test/mix_clean.scp
    test_regi_scp: /home/minyeong/dataset/flowtse_list/libri2mix_test/aux_s1.scp
    test_clean_scp: /home/minyeong/dataset/flowtse_list/libri2mix_test/s1.scp

    use_dynamic_mixing_train: True
    
    train_speaker_scp_for_dm: /home/minyeong/dataset/flowtse_list/train/train_100_360.pt
    epoch_num_for_dm: 100000
    batch_size: 4
    num_workers: 4

    mix_length: 49024     # target_len = (num_frames-1) * hop_length, (256-1)*128=32640, (384-1)*128=49024
    regi_length: 64080

    # STFT parameters
    n_fft: 510        # 254 for 128 frequency bins. 510 for 256 frequency bins
    hop_length: 128
    window_type: "hann"
    spec_factor: 0.15
    spec_abs_exponent: 0.5

    pin_memory: True
    return_time: False

trainer_args:
  _target_: pytorch_lightning.Trainer
  accumulate_grad_batches: 4
  min_epochs: 1
  max_epochs: 50
  accelerator: gpu
  deterministic: True
  check_val_every_n_epoch: 1
  devices: 1
  precision: 16-mixed
  gradient_clip_val: 5.0
  num_sanity_val_steps: 0

callbacks:
    - _target_: pytorch_lightning.callbacks.RichProgressBar


hydra:
    run:
        dir: exp/${now:%Y-%m-%d}_${now:%H-%M-%S}_${hydra.job.override_dirname}_discriminative
    job:
        config:
            override_dirname:
                kv_sep: '-'
                item_sep: '_'
                # exclude_keys: 
                #     - path.exp_root

